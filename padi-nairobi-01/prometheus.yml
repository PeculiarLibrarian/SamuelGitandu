# =====================================================
# PADI EXECUTOR v5.3 — Prometheus Configuration
# =====================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    node: 'nairobi-01'
    environment: 'production'

# Alertmanager Configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

# Load Rules
rule_files:
  - "alert_rules.yml"

# Scrape Configurations
scrape_configs:
  # PADI Executor Metrics
  - job_name: 'padi_executor'
    static_configs:
      - targets: ['localhost:8000']
    scrape_interval: 10s
    metrics_path: '/metrics'

  # Web3 Node Metrics (Geth/Nethermind)
  - job_name: 'geth_node'
    static_configs:
      - targets: ['localhost:8545']
    scrape_interval: 30s

  # Host Metrics (Node Exporter)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['localhost:9100']
    scrape_interval: 30s

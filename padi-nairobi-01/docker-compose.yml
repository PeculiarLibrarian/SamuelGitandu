# =====================================================
# Docker Compose — PADI Nairobi-01 Production v3.0
# =====================================================
#
# Sovereign Perfection — Production Observatory v3.0
# Nairobi Node-01 — PADI Sovereign Bureau
#
# SERVICES DEFINED:
#   ✅ executor — PADI Executor Service (with Alchemy bridge)
#   ✅ geth — Ethereum Blockchain Node
#   ✅ node_exporter — Host Metrics Exporter
#   ✅ cadvisor — Container Metrics Exporter
#   ✅ prometheus — Metrics Collection Platform
#   ✅ alertmanager — Alert Routing Engine
#   ✅ grafana — Visualization Dashboard
#
# ENHANCEMENTS IN v3.0:
#   ✅ Updated volume mounts for alertmanager config (v2.2-PROD)
#   ✅ Updated volume mount for prometheus rules (alert-rules.yml)
#   ✅ Added alertmanager .env file reference
#   ✅ Alchemy Integration: Added RPC endpoint configuration
#   ✅ Restart policy: unless-stopped
#
# Version: 3.0-PROD (Alchemy Integration)
# Node: Nairobi-01
# Environment: Production
# File: docker-compose.yml
# =====================================================

version: '3.8'

services:
  # =====================================================
  # PADI EXECUTOR SERVICE
  # =====================================================
  executor:
    image: padi/executor:latest
    container_name: padi-executor
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_NAME=nairobi-01
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      # ✅ Alchemy Configuration
      - ALCHEMY_ENABLED=true
      - ALCHEMY_ENDPOINT=https://eth-mainnet.g.alchemy.com/v2/YOUR_API_KEY
      - ALCHEMY_NETWORK=mainnet
      - ALCHEMY_CHAIN_ID=1
      - ALCHEMY_APP_NAME=peculiars-first-app
      - ALCHEMY_RPC_TIMEOUT=30000
    volumes:
      - ./executor/data:/data
      - ./executor/config:/config:ro
    networks:
      - padi-monitoring-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.padi.service=executor"
      - "com.padi.node=nairobi-01"
      - "com.padi.alchemy.enabled=true"

  # =====================================================
  # GETH (ETHEREUM BLOCKCHAIN NODE)
  # =====================================================
  geth:
    image: ethereum/client-go:latest
    container_name: geth
    restart: unless-stopped
    ports:
      - "8545:8545"    # RPC
      - "8546:8546"    # WebSocket RPC
      - "30303:30303"  # P2P
      - "30303:30303/udp"
      - "6060:6060"    # Metrics
    volumes:
      - ./geth/data:/data
      - ./geth/config:/config:ro
    command: >
      --http
      --http.api eth,net,web3,admin
      --http.addr 0.0.0.0
      --http.port 8545
      --http.corsdomain "*"
      --ws
      --ws.api eth,net,web3,admin
      --ws.addr 0.0.0.0
      --ws.port 8546
      --ws.origins "*"
      --metrics
      --metrics.addr 0.0.0.0
      --metrics.port 6060
      --nodiscover
      --maxpeers 50
    environment:
      - NODE_NAME=nairobi-01
      - CHAIN_ID=1
    networks:
      - padi-monitoring-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.padi.service=geth"
      - "com.padi.node=nairobi-01"

  # =====================================================
  # NODE EXPORTER (HOST METRICS)
  # =====================================================
  node_exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node_exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - padi-monitoring-net
    labels:
      - "com.padi.service=node_exporter"
      - "com.padi.node=nairobi-01"

  # =====================================================
  # CADVISOR (CONTAINER METRICS)
  # =====================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.1
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - padi-monitoring-net
    labels:
      - "com.padi.service=cadvisor"
      - "com.padi.node=nairobi-01"

  # =====================================================
  # PROMETHEUS (METRICS COLLECTION)
  # =====================================================
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    volumes:
      # Prometheus configuration
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Prometheus alert rules (UPDATED v3.0 — single consolidated file)
      - ./monitoring/prometheus/alerts/alert-rules.yml:/etc/prometheus/alerts/alert-rules.yml:ro
      # Prometheus TSDB data
      - ./monitoring/prometheus/data:/prometheus
    networks:
      - padi-monitoring-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.padi.service=prometheus"
      - "com.padi.node=nairobi-01"

  # =====================================================
  # ALERTMANAGER (ALERT ROUTING) — With Environment Variables
  # =====================================================
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
      - '--cluster.listen-address=0.0.0.0:9094'
      - '--web.external-url=http://localhost:9093'
      - '--web.route-prefix=/'
    env_file:
      - ./monitoring/alertmanager/.env  # ✅ REFERENCE .env FILE
    ports:
      - "9093:9093"
      - "9094:9094"
    volumes:
      # Alertmanager configuration (UPDATED v2.2-PROD)
      - ./monitoring/alertmanager/alertmanager_config.yml:/etc/alertmanager/config.yml:ro
      # Alertmanager templates directory
      - ./monitoring/alertmanager/templates:/etc/alertmanager/templates:ro
      # Alertmanager storage
      - ./monitoring/alertmanager/data:/alertmanager
    networks:
      - padi-monitoring-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.padi.service=alertmanager"
      - "com.padi.node=nairobi-01"

  # =====================================================
  # GRAFANA (VISUALIZATION DASHBOARD)
  # =====================================================
  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - ./monitoring/grafana/data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - padi-monitoring-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.padi.service=grafana"
      - "com.padi.node=nairobi-01"

# =====================================================
# NETWORKS
# =====================================================
networks:
  padi-monitoring-net:
    driver: bridge
    name: padi-monitoring-net

# =====================================================
# VOLUMES (optional — use bind mounts as defined above)
# =====================================================
volumes:
  executor-data:
  geth-data:
  prometheus-data:
  alertmanager-data:
  grafana-data:

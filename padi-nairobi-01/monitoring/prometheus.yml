# =====================================================
# Prometheus Configuration — PADI Nairobi-01 PROD v2.1.1
# =====================================================
# Sovereign Perfection — Final Production Build
# =====================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  
  external_labels:
    cluster: 'padi-nairobi-01'
    node: 'nairobi-01'
    environment: 'production'
    bureau: 'padi-sovereign-bureau'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s
      api_version: v2

rule_files:
  - '/etc/prometheus/rules/padi-alerts.yml'

scrape_configs:
  # --- INTERNAL MONITORING ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels: { service: 'monitoring', role: 'metrics_collector' }

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels: { service: 'monitoring', role: 'alert_routing' }

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels: { service: 'monitoring', role: 'visualization' }

  # --- PADI EXECUTION LAYER ---
  - job_name: 'padi-executor'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['executor:8080']
        labels: { service: 'executor', role: 'transaction_executor' }

  # --- BLOCKCHAIN INFRASTRUCTURE (Local Node) ---
  - job_name: 'geth'
    metrics_path: '/debug/metrics/prometheus'
    scrape_timeout: 10s
    static_configs:
      - targets: ['10.10.0.20:6060']
        labels: 
          service: 'geth'
          blockchain: 'ethereum'
          network: 'mainnet'
          role: 'full_node'

  # --- HOST & CONTAINER HEALTH ---
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['10.10.0.20:9100']
        labels: { service: 'node_exporter', role: 'host_metrics' }

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
      # Labels are typically auto-generated by cadvisor per container

  # --- EXTERNAL HEARTBEAT ---
  - job_name: 'healthchecks_heartbeat'
    metrics_path: '/ping'
    scheme: 'https'
    static_configs:
      - targets: ['hc-ping.com']
        labels: { service: 'monitoring', category: 'heartbeat' }
    honor_labels: true

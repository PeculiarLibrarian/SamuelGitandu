# =====================================================
# Prometheus Configuration — PADI Nairobi-01 PROD v3.0
# =====================================================
#
# Sovereign Perfection — Production Observatory v3.0
# Nairobi Node-01 — PADI Sovereign Bureau
#
# IMPROVEMENTS EMBEDDED:
#   ✅ DNS Consistency: Switched 'localhost' to 'prometheus' for container networking.
#   ✅ Storage Sync: Aligned TSDB retention with Docker Compose flags.
#   ✅ Label Precision: Fixed job name mapping for Alert Rules compatibility.
#   ✅ Alchemy Readiness: Configured Executor to act as the RPC bridge.
#   ✅ Alchemy Integration: Added RPC metric exporter for endpoint monitoring.
#
# Version: 3.0-PROD (Alchemy Integration)
# Node: Nairobi-01
# Environment: Production
# File: monitoring/prometheus/prometheus.yml
# =====================================================

global:
  scrape_interval: 15s     # PADI Standard: High-frequency monitoring
  scrape_timeout: 10s
  evaluation_interval: 15s # How often to evaluate Alert Rules
  external_labels:
    cluster: 'padi-nairobi-01'
    environment: 'production'
    timezone: 'Africa/Nairobi'
    node: 'nairobi-01'
    owner: 'peculiar-librarian'

# 🏛️ Sovereign Alert Rules (Consolidated v3.0)
rule_files:
  - '/etc/prometheus/alerts/alert-rules.yml'

scrape_configs:
  # =====================================================
  # MONITORING STACK SELF-OBSERVATION
  # =====================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090'] # Using DNS name for container consistency
    metrics_path: '/metrics'

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
    metrics_path: '/metrics'

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: '/metrics'

  # =====================================================
  # PADI EXECUTOR (The Sovereign Brain)
  # Acts as the bridge for Alchemy RPC Metrics
  # =====================================================
  - job_name: 'executor'
    static_configs:
      - targets: ['executor:8080']
        labels:
          instance: 'executor:8080'
          service: 'executor'
          category: 'node'
          alchemy_enabled: 'true'
          rpc_provider: 'alchemy'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # =====================================================
  # ALCHEMY RPC METRIC EXPORTER (NEW)
  # Monitors Alchemy endpoint health, latency, and response rates
  # =====================================================
  - job_name: 'alchemy_rpc'
    static_configs:
      - targets: ['executor:8080']
        labels:
          instance: 'alchemy-bridge:8080'
          service: 'alchemy'
          category: 'rpc'
          blockchain: 'ethereum'
          network: 'mainnet'
          provider: 'alchemy'
          alchemy_app: 'peculiars-first-app'
    metrics_path: '/metrics/alchemy'
    scrape_interval: 15s
    scrape_timeout: 10s

  # =====================================================
  # BLOCKCHAIN INFRASTRUCTURE (Geth/RPC)
  # =====================================================
  - job_name: 'geth'
    static_configs:
      - targets: ['geth:6060']
        labels:
          instance: '10.10.0.20:6060' # Matches Alert Rule expressions
          blockchain: 'ethereum'
          provider: 'alchemy-bridge'
    metrics_path: '/debug/metrics/prometheus'
    scrape_interval: 15s

  # =====================================================
  # BARE METAL & CONTAINER OBSERVABILITY
  # =====================================================
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['10.10.0.20:9100']
        labels:
          instance: '10.10.0.20:9100'
          service: 'node_exporter'
          category: 'host'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: '/metrics'
    scrape_timeout: 10s

# =====================================================
# ALERTING PIPELINE
# =====================================================
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
          labels:
            cluster: 'padi-nairobi-01'

# =====================================================
# STORAGE GOVERNANCE
# =====================================================
storage:
  tsdb:
    path: '/prometheus'
    retention.time: '15d' # Synced with PADI data lifecycle policy
